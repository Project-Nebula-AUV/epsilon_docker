services:
  dev:
    image: lunarzdev/epsilon-dev:rpi
    build:
      args:
        TARGET_PLATFORM: rpi
    environment:
      DISPLAY: host.docker.internal:0
    volumes: []
    privileged: true
    restart: unless-stopped
    group_add:
      - "986"   # gpio  (host /dev/gpiochip* group)
      - "988"   # i2c   (host /dev/i2c-* group)
      - "44"    # video (host /dev/video* group; USB OV9782 camera)
      - "20"    # dialout (host /dev/ttyACM* group; ESP32-C3 depth bridge -- takes effect on next container recreate)
  sitl:
    image: lunarzdev/epsilon-sitl:rpi
    environment:
      DISPLAY: host.docker.internal:0
    volumes:
      - ./boat.param:/param/boat.param:rw
