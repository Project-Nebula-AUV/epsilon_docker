# TRIM VARIANT (2026-07-06): heave wrench -0.22 (= verticals ~-22) on
# all non-heave steps — buoyancy hold across the 100 s run; the heave
# ramp itself stays pure.
# S8 deadband ramps: slow 0 -> +/-0.15 wrench ramps per axis; the command at
# motion onset (gyro/accel departure in imu.csv) = the deadband. 10 s up-ramps
# for resolution, 1 s hold, snap to zero, then the negative side.
name: s8_deadband_ramps_trim
mode: wrench
max_abs: 20.0
steps:
  - {dur: 3.0, wrench: [0, 0, -0.22, 0, 0], label: baseline}
  - {dur: 10.0, wrench: [0.15, 0, -0.22, 0, 0], ramp: true, label: surge-ramp-up}
  - {dur: 1.0, wrench: [0.15, 0, -0.22, 0, 0], label: surge-hold}
  - {dur: 3.0, wrench: [0, 0, -0.22, 0, 0], label: rest}
  - {dur: 10.0, wrench: [-0.15, 0, -0.22, 0, 0], ramp: true, label: surge-ramp-down}
  - {dur: 1.0, wrench: [-0.15, 0, -0.22, 0, 0], label: surge-hold-neg}
  - {dur: 3.0, wrench: [0, 0, -0.22, 0, 0], label: rest}
  - {dur: 10.0, wrench: [0, 0.15, -0.22, 0, 0], ramp: true, label: sway-ramp-up}
  - {dur: 1.0, wrench: [0, 0.15, -0.22, 0, 0], label: sway-hold}
  - {dur: 3.0, wrench: [0, 0, -0.22, 0, 0], label: rest}
  - {dur: 10.0, wrench: [0, -0.15, -0.22, 0, 0], ramp: true, label: sway-ramp-down}
  - {dur: 1.0, wrench: [0, -0.15, -0.22, 0, 0], label: sway-hold-neg}
  - {dur: 3.0, wrench: [0, 0, -0.22, 0, 0], label: rest}
  - {dur: 10.0, wrench: [0, 0, -0.22, 0.15, 0], ramp: true, label: yaw-ramp-ccw}
  - {dur: 1.0, wrench: [0, 0, -0.22, 0.15, 0], label: yaw-hold}
  - {dur: 3.0, wrench: [0, 0, -0.22, 0, 0], label: rest}
  - {dur: 10.0, wrench: [0, 0, -0.22, -0.15, 0], ramp: true, label: yaw-ramp-cw}
  - {dur: 1.0, wrench: [0, 0, -0.22, -0.15, 0], label: yaw-hold-neg}
  - {dur: 3.0, wrench: [0, 0, -0.22, 0, 0], label: rest}
  - {dur: 10.0, wrench: [0, 0, -0.15, 0, 0], ramp: true, label: heave-ramp-down}
  - {dur: 1.0, wrench: [0, 0, -0.15, 0, 0], label: heave-hold}
  - {dur: 3.0, wrench: [0, 0, -0.22, 0, 0], label: tail}
