# S6 sway steps at the gate: sway thrust/drag from gate bearing/width drift.
# Start ~4 m from the gate, facing it, gate centered. Alternating directions
# so the sub stays near the start line.
# 2026-07-08: sway magnitudes RAISED 0.20/0.35 -> 0.40/0.65. The old values
# were barely audible/visible (hard to confirm the run was live): under the
# measured quadratic curve T=0.0015*cmd^2 N/motor, sway 0.20 = ~18% corner cmd
# = ~0.5 N/motor; 0.65 = 65% = ~6 N/motor, unmistakable. max_abs 70 keeps
# headroom so NO corner saturates (sway allocation peaks at 1.0*cmd -> 65 < 70),
# preserving the linear-in-command sway fit. 65% stays under the F12
# brownout guidance (<=80% on a fresh battery).
name: s6_sway_steps
mode: wrench
max_abs: 70.0
steps:
  - {dur: 3.0, wrench: [0, 0, 0, 0, 0], label: baseline-gate-visible}
  - {dur: 5.0, wrench: [0, 0.40, 0, 0, 0], label: sway40-right}
  - {dur: 4.0, wrench: [0, 0, 0, 0, 0], label: coast1}
  - {dur: 5.0, wrench: [0, -0.40, 0, 0, 0], label: sway40-left}
  - {dur: 4.0, wrench: [0, 0, 0, 0, 0], label: coast2}
  - {dur: 5.0, wrench: [0, 0.65, 0, 0, 0], label: sway65-right}
  - {dur: 4.0, wrench: [0, 0, 0, 0, 0], label: coast3}
  - {dur: 5.0, wrench: [0, -0.65, 0, 0, 0], label: sway65-left}
  - {dur: 4.0, wrench: [0, 0, 0, 0, 0], label: tail-coast}
